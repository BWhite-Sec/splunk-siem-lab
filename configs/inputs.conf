# Splunk Universal Forwarder — inputs.conf
# Location on forwarder: C:\Program Files\SplunkUniversalForwarder\etc\system\local\inputs.conf
# Sanitized for public repo — no host-specific values included.

[WinEventLog://Security]
disabled = false
index = main

[WinEventLog://System]
disabled = false
index = main

[WinEventLog://Application]
disabled = false
index = main

[WinEventLog://Microsoft-Windows-Sysmon/Operational]
disabled = false
index = main
renderXml = true
sourcetype = XmlWinEventLog:Microsoft-Windows-Sysmon/Operational
